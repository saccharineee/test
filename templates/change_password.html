{% extends "base.html" %}
{% block content %}
<div class="card login-card">
    <h2>修改密码</h2>
    {% if error %}
        <div class="error-msg">{{ error }}</div>
    {% endif %}
    {% if success %}
        <div class="success-msg">{{ success }}</div>
    {% endif %}
    <form method="POST" action="/change-password" class="login-form">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
        <div class="form-group">
            <label for="new_password">新密码</label>
            <input type="password" id="new_password" name="new_password" placeholder="至少 8 位" required minlength="8">
        </div>
        <div class="form-group">
            <label for="confirm_password">确认新密码</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="再次输入新密码" required minlength="8">
        </div>
        <button type="submit" class="btn btn-primary">修改密码</button>
        <a href="/" class="btn btn-secondary" style="margin-top: 10px;">返回首页</a>
    </form>
</div>
{% endblock %}
