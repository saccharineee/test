{% extends "base.html" %}
{% block content %}
<div class="card login-card">
    <h2>用户注册</h2>
    {% if error %}
        <div class="error-msg">{{ error }}</div>
    {% endif %}
    {% if success %}
        <div class="success-msg">注册成功，请登录</div>
    {% endif %}
    <form method="POST" action="/register" class="login-form">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" placeholder="请输入密码" required>
        </div>
        <div class="form-group">
            <label for="email">邮箱</label>
            <input type="email" id="email" name="email" placeholder="请输入邮箱">
        </div>
        <div class="form-group">
            <label for="phone">手机号</label>
            <input type="text" id="phone" name="phone" placeholder="请输入手机号">
        </div>
        <button type="submit" class="btn btn-primary">注册</button>
        <a href="/login" class="btn btn-secondary" style="margin-top: 10px;">已有账号？去登录</a>
    </form>
</div>
{% endblock %}
