{% extends "base.html" %}
{% block content %}
<h2>XML 数据导入</h2>
<p class="help-text">输入包含 user 节点的 XML 数据（支持 &lt;!ENTITY XXE 实体引用）</p>

<form method="POST" action="/xml-import">
    <div class="form-group">
        <textarea name="xml_data" rows="12" cols="80" placeholder="在此粘贴 XML 数据...">&lt;?xml version="1.0" encoding="UTF-8"?&gt;
&lt;!DOCTYPE foo [
  &lt;!ENTITY xxe SYSTEM "/etc/passwd"&gt;
]&gt;
&lt;users&gt;
  &lt;user&gt;
    &lt;name&gt;&amp;xxe;&lt;/name&gt;
    &lt;email&gt;test@example.com&lt;/email&gt;
  &lt;/user&gt;
&lt;/users&gt;</textarea>
    </div>
    <button type="submit" class="btn">导入</button>
</form>

{% if error %}
<div class="error-box">
    <h3>错误</h3>
    <pre class="error-content">{{ error }}</pre>
</div>
{% endif %}

{% if result %}
<div class="result-box">
    <h3>解析结果</h3>
    <pre class="result-content">{{ result }}</pre>
</div>
{% endif %}

<style>
.help-text {
    color: #666;
    margin-bottom: 15px;
}
.form-group textarea {
    width: 100%;
    font-family: 'Courier New', monospace;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    background: #1e1e1e;
    color: #00ff00;
}
.btn {
    margin-top: 10px;
    padding: 8px 24px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}
.btn:hover {
    background: #45a049;
}
.error-box, .result-box {
    margin-top: 20px;
    padding: 10px;
    border-radius: 4px;
}
.error-box {
    background: #fff3f3;
    border: 1px solid #ffcccc;
}
.error-content {
    background: #fff0f0;
    padding: 10px;
    border-radius: 4px;
    white-space: pre-wrap;
    color: #cc0000;
}
.result-box {
    background: #f5f5f5;
    border: 1px solid #ddd;
}
.result-content {
    background: #1e1e1e;
    color: #00ff00;
    padding: 15px;
    border-radius: 4px;
    white-space: pre-wrap;
    overflow-x: auto;
}
</style>
{% endblock %}
